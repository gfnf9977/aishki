<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Tech Toolbox</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Перемкнути тему">🌙</button>
        <h1>AI & Tech Toolbox</h1>
        <p>Твій преміальний цифровий арсенал</p>
    </header>

    <div class="controls-wrapper">
        <input type="text" id="toolSearch" placeholder="Знайти інструмент (напр. 'Figma', 'OSINT')..." autocomplete="off">
        <select id="filterMonetization" class="filter-select">
            <option value="all">💳 Усі тарифи</option>
            <option value="free">🟢 Безкоштовні / Open Source</option>
            <option value="paid">🔴 Платні / Freemium</option>
        </select>
        <select id="filterUsed" class="filter-select">
            <option value="all">🛠️ Усі статуси</option>
            <option value="tested">✓ Протестовані</option>
            <option value="untested">○ Не тестовані</option>
        </select>
    </div>

    <nav class="categories-nav" id="categoriesNav"></nav>
    <main class="container" id="toolsContainer"></main>

    <div class="fab-container">
        <div class="fab-tooltip hint-anim">Підібрати інструмент?</div>
        <button class="ai-fab" onclick="toggleAiWidget()" title="Запитати ШІ">✨</button>
    </div>

    <div class="ai-chat-window" id="aiChatWindow">
        <div class="ai-chat-header">
            <h3>✨ ШІ-Консьєрж</h3>
            <button class="ai-close-btn" onclick="toggleAiWidget()">✕</button>
        </div>
        <div class="ai-chat-body">
            <div class="ai-modes">
                <label class="ai-mode-label"><input type="radio" name="aiMode" value="global" checked> <span>🌍 Найкращі всюди</span></label>
                <label class="ai-mode-label"><input type="radio" name="aiMode" value="local"> <span>📁 Тільки наявні в базі</span></label>
                <label class="ai-mode-label"><input type="radio" name="aiMode" value="exclude"> <span>🚫 Знайти нове (Уникати бази)</span></label>
            </div>
            <textarea id="taskInput" placeholder="Опишіть задачу, і я підберу інструмент..."></textarea>
            <div class="ai-buttons">
                <button onclick="analyzeTask()" class="btn-ai btn-ai-primary">Знайти</button>
                <button onclick="clearAssistant()" class="btn-ai btn-ai-secondary">Очистити</button>
            </div>
            <div id="aiResponse"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
